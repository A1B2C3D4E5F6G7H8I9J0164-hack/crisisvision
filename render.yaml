services:
  # The FastAPI Backend
  - type: web
    name: crisisvision-api
    env: python
    region: oregon # or your preferred region
    buildCommand: "cd backend && pip install -r requirements.txt"
    startCommand: "cd backend && python -m uvicorn main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.0
